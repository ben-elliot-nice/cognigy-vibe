# .github/workflows/_release.yml
name: Release

on:
  workflow_call:
    inputs:
      prerelease:
        type: boolean
        required: true
      environment:
        type: string
        required: true
      version:
        type: string
        required: false
        default: ''
        description: 'Version to publish. If empty, read from pyproject.toml (stable path).'

jobs:
  release:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v7

      - name: Compute version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION=$(python3 -c "
          import re
          m = re.search(r'^version\s*=\s*\"([^\"]+)\"', open('cognigy-mcp/pyproject.toml').read(), re.MULTILINE)
          if not m:
              raise SystemExit('Could not parse version from cognigy-mcp/pyproject.toml')
          print(m.group(1))
            ")
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"

      - name: Check tag does not already exist
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          if gh release view "$TAG" &>/dev/null; then
            echo "Release $TAG already exists — skipping"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: astral-sh/setup-uv@v8.2.0
        if: steps.check.outputs.skip == 'false'
        with:
          enable-cache: true

      - name: Patch version in pyproject.toml
        if: steps.check.outputs.skip == 'false'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          sed -i "s/^version = \"[^\"]*\"/version = \"${VERSION}\"/" cognigy-mcp/pyproject.toml
          echo "Patched pyproject.toml to version $VERSION"

      - name: Validate plugin.json launcher version matches release version
        if: steps.check.outputs.skip == 'false'
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          python3 << 'PYTHON'
          import json, pathlib, sys, os
          version = os.environ.get("VERSION", "")
          if not version:
              print("::error::VERSION is empty — cannot validate plugin.json", file=sys.stderr)
              sys.exit(1)
          p = pathlib.Path("plugin/.claude-plugin/plugin.json")
          data = json.loads(p.read_text())
          args = data["mcpServers"]["cognigy-vibe"]["args"]
          expected = f"cognigy-vibe-mcp=={version}"
          actual = next((a for a in args if a.startswith("cognigy-vibe-mcp==")), None)
          if actual != expected:
              print(f"::error::plugin.json args has {actual!r}, expected {expected!r} — update plugin.json before releasing", file=sys.stderr)
              sys.exit(1)
          print(f"plugin.json version check passed: {actual}", file=sys.stderr)
          PYTHON

      - name: Build
        if: steps.check.outputs.skip == 'false'
        run: |
          cd cognigy-mcp
          uv build

      - name: Publish to PyPI
        if: steps.check.outputs.skip == 'false'
        run: |
          cd cognigy-mcp
          uv publish
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.UV_PUBLISH_TOKEN }}

      - name: Create GitHub release
        if: steps.check.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          VERSION="${{ steps.version.outputs.version }}"
          if [ "${{ inputs.prerelease }}" = "true" ]; then
            gh release create "$TAG" \
              --title "$TAG" \
              --notes "Install: \`uvx cognigy-vibe-mcp==${VERSION}\` or \`uv tool install cognigy-vibe-mcp --prerelease allow\`" \
              --prerelease
          else
            gh release create "$TAG" \
              --title "$TAG" \
              --notes "Install: \`uvx cognigy-vibe-mcp\`"
          fi
