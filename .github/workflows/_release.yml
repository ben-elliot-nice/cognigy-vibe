# .github/workflows/_release.yml
name: Release

on:
  workflow_call:
    inputs:
      prerelease:
        type: boolean
        required: true
      environment:
        type: string
        required: true
      version:
        type: string
        required: false
        default: ''
        description: 'Version to publish. If empty, read from pyproject.toml (stable path).'

jobs:
  release:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v7

      - name: Compute version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION=$(python3 -c "
          import re
          m = re.search(r'^version\s*=\s*\"([^\"]+)\"', open('cognigy-mcp/pyproject.toml').read(), re.MULTILINE)
          if not m:
              raise SystemExit('Could not parse version from cognigy-mcp/pyproject.toml')
          print(m.group(1))
            ")
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"

      - name: Check tag does not already exist
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          if gh release view "$TAG" &>/dev/null; then
            echo "Release $TAG already exists — skipping"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: astral-sh/setup-uv@v8.2.0
        if: steps.check.outputs.skip == 'false'
        with:
          enable-cache: true

      - name: Patch versions and commit release snapshot (prerelease)
        if: steps.check.outputs.skip == 'false' && inputs.prerelease == true
        env:
          VERSION: ${{ steps.version.outputs.version }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          # Patch pyproject.toml
          sed -i "s/^version = \"[^\"]*\"/version = \"${VERSION}\"/" cognigy-mcp/pyproject.toml
          echo "Patched pyproject.toml to ${VERSION}"

          # Patch plugin.json version field and MCP args pin
          python3 << 'PYTHON'
          import json, pathlib, os
          version = os.environ["VERSION"]
          p = pathlib.Path("plugin/.claude-plugin/plugin.json")
          data = json.loads(p.read_text())
          data["version"] = version
          # Rebuild args: strip any existing --prerelease flag, update version pin, add --prerelease allow
          args = data["mcpServers"]["cognigy-vibe"]["args"]
          args = [a for a in args if a not in ("--prerelease", "allow")]
          args = [f"cognigy-vibe-mcp=={version}" if a.startswith("cognigy-vibe-mcp==") else a for a in args]
          args = ["--prerelease", "allow"] + args
          data["mcpServers"]["cognigy-vibe"]["args"] = args
          p.write_text(json.dumps(data, indent=2) + "\n")
          print(f"Patched plugin.json to {version} with --prerelease allow")
          PYTHON

          # Commit, retag, push — dev stays clean; tag points to the patched snapshot
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add cognigy-mcp/pyproject.toml plugin/.claude-plugin/plugin.json
          git commit -m "chore(release): patch versions to ${VERSION} [skip ci]"
          git tag -f "${TAG}"
          git push origin "${TAG}" --force

      - name: Validate plugin.json launcher version matches release version (stable)
        if: steps.check.outputs.skip == 'false' && inputs.prerelease == false
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          python3 << 'PYTHON'
          import json, pathlib, sys, os
          version = os.environ["VERSION"]
          p = pathlib.Path("plugin/.claude-plugin/plugin.json")
          data = json.loads(p.read_text())
          args = data["mcpServers"]["cognigy-vibe"]["args"]
          expected = f"cognigy-vibe-mcp=={version}"
          actual = next((a for a in args if a.startswith("cognigy-vibe-mcp==")), None)
          if actual != expected:
              print(f"::error::plugin.json has {actual!r}, expected {expected!r} — update plugin.json to the stable version before merging to main", file=sys.stderr)
              sys.exit(1)
          print(f"plugin.json version check passed: {actual}")
          PYTHON

      - name: Build
        if: steps.check.outputs.skip == 'false'
        run: |
          cd cognigy-mcp
          uv build

      - name: Publish to PyPI
        if: steps.check.outputs.skip == 'false'
        run: |
          cd cognigy-mcp
          uv publish
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.UV_PUBLISH_TOKEN }}

      - name: Create GitHub release
        if: steps.check.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          VERSION="${{ steps.version.outputs.version }}"
          if [ "${{ inputs.prerelease }}" = "true" ]; then
            gh release create "$TAG" \
              --title "$TAG" \
              --notes "Install: \`uvx cognigy-vibe-mcp==${VERSION}\` or \`uv tool install cognigy-vibe-mcp --prerelease allow\`" \
              --prerelease
          else
            gh release create "$TAG" \
              --title "$TAG" \
              --notes "Install: \`uvx cognigy-vibe-mcp\`"
          fi
