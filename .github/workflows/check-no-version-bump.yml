# .github/workflows/check-no-version-bump.yml
name: Check no version bump

on:
  pull_request:
    branches: [dev]
    paths:
      - 'cognigy-mcp/pyproject.toml'
      - '.claude-plugin/plugin.json'

jobs:
  version-check:
    name: Verify version was not bumped
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch dev for comparison
        run: git fetch origin dev

      - name: Check pyproject.toml version not bumped
        run: |
          CURRENT=$(grep '^version = ' cognigy-mcp/pyproject.toml | sed 's/version = "\(.*\)"/\1/')
          BASE=$(git show origin/dev:cognigy-mcp/pyproject.toml | grep '^version = ' | sed 's/version = "\(.*\)"/\1/')

          echo "dev:     $BASE"
          echo "current: $CURRENT"

          if [ "$CURRENT" != "$BASE" ]; then
            echo "::error::Version must not be bumped on dev PRs. Version changes only happen in the dev → main PR."
            exit 1
          fi

          echo "pyproject.toml version unchanged ✓"

      - name: Check plugin.json version not bumped
        run: |
          CURRENT=$(jq -r '.version' .claude-plugin/plugin.json)
          BASE=$(git show origin/dev:.claude-plugin/plugin.json | jq -r '.version')

          echo "dev:     $BASE"
          echo "current: $CURRENT"

          if [ "$CURRENT" != "$BASE" ]; then
            echo "::error::plugin.json version must not be bumped on dev PRs."
            exit 1
          fi

          echo "plugin.json version unchanged ✓"
