name: Claude PR Review

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request:
    types: [synchronize]

jobs:
  claude-review:
    if: |
      (github.event_name == 'issue_comment' && github.event.issue.pull_request && contains(github.event.comment.body, '@claude-review') && github.event.comment.user.type != 'Bot') ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude-review') && github.event.comment.user.type != 'Bot') ||
      github.event_name == 'pull_request'

    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write

    steps:
      # Pushes only auto-trigger a re-review once a human has opted the PR in
      # via an initial @claude-review comment. Skip silently otherwise so
      # every push doesn't run a review nobody asked for.
      - name: Check for prior review request
        if: github.event_name == 'pull_request'
        id: check-requested
        uses: actions/github-script@v7
        with:
          script: |
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
            });
            const requested = comments.some(c => c.body.includes('@claude-review'));
            core.setOutput('requested', requested);

      - name: Checkout repository
        if: github.event_name != 'pull_request' || steps.check-requested.outputs.requested == 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude PR Review
        if: github.event_name != 'pull_request' || steps.check-requested.outputs.requested == 'true'
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          plugin_marketplaces: 'https://github.com/anthropics/claude-code.git'
          plugins: 'pr-review-toolkit@claude-code-plugins'
          prompt: |
            /pr-review-toolkit:review-pr ${{ github.repository }}/pull/${{ github.event.issue.number || github.event.pull_request.number }}

            Post the review findings as a PR comment via `gh pr comment`, signed
            with the byline `*— Claude Reviewer*` at the bottom of the comment body.
          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://code.claude.com/docs/en/cli-reference for available options
