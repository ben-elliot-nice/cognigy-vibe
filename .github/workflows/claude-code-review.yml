name: Claude PR Review

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request:
    types: [synchronize]

jobs:
  claude-review:
    if: |
      (github.event_name == 'issue_comment' && github.event.issue.pull_request && contains(github.event.comment.body, '@claude-review') && github.event.comment.user.type != 'Bot' && contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude-review') && github.event.comment.user.type != 'Bot' && contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)) ||
      (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'claude-review-requested'))

    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write

    steps:
      # Marks the PR as opted-in so future pushes auto re-trigger a review
      # without re-scanning comment history. The label is the durable signal;
      # only a maintainer's own @claude-review comment (gated above) can set it.
      - name: Mark PR as opted into auto re-review
        if: github.event_name != 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const issueNumber = context.payload.issue
              ? context.payload.issue.number
              : context.payload.pull_request.number;
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              labels: ['claude-review-requested'],
            });

      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - name: Run Claude PR Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          plugin_marketplaces: 'https://github.com/anthropics/claude-code.git'
          plugins: 'pr-review-toolkit@claude-code-plugins'
          claude_args: '--allowedTools Skill'
          show_full_output: true
          prompt: |
            /pr-review-toolkit:review-pr ${{ github.repository }}/pull/${{ github.event.issue.number || github.event.pull_request.number }}

            Post the review findings as a PR comment via `gh pr comment`, signed
            with the byline `*— Claude Reviewer*` at the bottom of the comment body.

            If there are no critical or important issues, also approve the PR:
            `gh pr review --approve -b "LGTM — no blocking issues found.\n\n*— Claude Reviewer*"`.
            If there are critical or important issues, do not approve — the comment
            alone is enough for this pass.
          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://code.claude.com/docs/en/cli-reference for available options
