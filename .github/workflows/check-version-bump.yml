name: Check version bump

on:
  pull_request:
    branches: [main]

jobs:
  version-check:
    name: Verify version was bumped
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch main for comparison
        run: git fetch origin main

      - name: Check version bump
        run: |
          set -e

          # Determine which files changed vs main
          CHANGED=$(git diff --name-only origin/main...HEAD)

          # Only enforce version bump for source code and skills changes
          SOURCE_CHANGED=$(echo "$CHANGED" | grep -E \
            '^(cognigy-mcp/cognigy_mcp/|cognigy-mcp/pyproject\.toml|skills/|\.claude-plugin/plugin\.json)' \
            || true)

          if [ -z "$SOURCE_CHANGED" ]; then
            echo "No source or skill changes detected — version bump not required."
            exit 0
          fi

          echo "Source changes detected:"
          echo "$SOURCE_CHANGED"
          echo ""

          CURRENT=$(grep '^version = ' cognigy-mcp/pyproject.toml | sed 's/version = "\(.*\)"/\1/')
          MAIN=$(git show origin/main:cognigy-mcp/pyproject.toml | grep '^version = ' | sed 's/version = "\(.*\)"/\1/')

          echo "main:    $MAIN"
          echo "current: $CURRENT"

          if [ "$CURRENT" = "$MAIN" ]; then
            echo "::error::Version not bumped. Bump both cognigy-mcp/pyproject.toml and .claude-plugin/plugin.json before merging to main."
            exit 1
          fi

          PLUGIN=$(python3 -c "import json; print(json.load(open('.claude-plugin/plugin.json'))['version'])")
          if [ "$CURRENT" != "$PLUGIN" ]; then
            echo "::error::Version mismatch: pyproject.toml ($CURRENT) ≠ plugin.json ($PLUGIN). Both must match."
            exit 1
          fi

          echo "Version bump verified: $MAIN → $CURRENT ✓"
