name: Check version bump

on:
  pull_request:
    branches: [main]

jobs:
  version-check:
    name: Verify version was bumped
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Fetch main for comparison
        run: git fetch origin main

      - name: Check version bump
        run: |
          set -e

          CURRENT=$(grep '^version = ' cognigy-vibe-mcp/pyproject.toml | sed 's/version = "\(.*\)"/\1/')
          # Fall back to old path on main for the transition from cognigy-mcp/ to cognigy-vibe-mcp/
          MAIN=$(git show origin/main:cognigy-vibe-mcp/pyproject.toml 2>/dev/null | grep '^version = ' | sed 's/version = "\(.*\)"/\1/' || \
                 git show origin/main:cognigy-mcp/pyproject.toml 2>/dev/null | grep '^version = ' | sed 's/version = "\(.*\)"/\1/')

          echo "main:    $MAIN"
          echo "current: $CURRENT"

          if [ "$CURRENT" = "$MAIN" ]; then
            echo "::error::Version not bumped. Bump both cognigy-vibe-mcp/pyproject.toml and plugin/.claude-plugin/plugin.json before merging to main."
            exit 1
          fi

          PLUGIN=$(jq -r '.version' plugin/.claude-plugin/plugin.json)
          if [ "$CURRENT" != "$PLUGIN" ]; then
            echo "::error::Version mismatch: pyproject.toml ($CURRENT) ≠ plugin.json ($PLUGIN). Both must match."
            exit 1
          fi

          echo "Version bump verified: $MAIN → $CURRENT ✓"
