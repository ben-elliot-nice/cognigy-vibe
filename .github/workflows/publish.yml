name: Publish to PyPI

on:
  release:
    types: [created]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check version is stable and not yet on PyPI
        id: check
        run: |
          pip install packaging --quiet
          python3 << 'PYEOF'
          import re, sys, os, urllib.request, urllib.error
          from packaging.version import Version

          text = open("cognigy-mcp/pyproject.toml").read()
          m = re.search(r'^version\s*=\s*"([^"]+)"', text, re.MULTILINE)
          if not m:
              print("ERROR: version not found in cognigy-mcp/pyproject.toml")
              sys.exit(1)

          version = m.group(1)
          v = Version(version)

          skip = "false"
          if v.is_prerelease:
              print(f"Version {version} is a pre-release — skipping publish.")
              skip = "true"
          else:
              try:
                  urllib.request.urlopen(f"https://pypi.org/pypi/cognigy-vibe-mcp/{version}/json")
                  print(f"Version {version} already exists on PyPI — skipping publish.")
                  skip = "true"
              except urllib.error.HTTPError as e:
                  if e.code == 404:
                      print(f"Version {version} not on PyPI — will publish.")
                  else:
                      raise

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"skip={skip}\n")
              f.write(f"version={version}\n")
          PYEOF

      - uses: astral-sh/setup-uv@v5
        if: steps.check.outputs.skip == 'false'
        with:
          enable-cache: true

      - name: Build package
        if: steps.check.outputs.skip == 'false'
        run: |
          cd cognigy-mcp
          uv build

      - name: Publish to PyPI
        if: steps.check.outputs.skip == 'false'
        run: |
          cd cognigy-mcp
          uv publish
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.UV_PUBLISH_TOKEN }}
